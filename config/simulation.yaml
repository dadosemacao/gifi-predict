# Autor: Emerson Antônio | Data: 2026-07-10
repo_root: "."
l2_root: "data/l2"
models_root: "models"
logs_root: "logs/simulation"
expected_schema_version: "1.0.0"
random_state: 42
# direct_tsa: modelo único TSA_dia com features observadas (sem cascata Elo1/2)
training_mode: direct_tsa
mae_metric: isolated
families: [baseline, elasticnet, randomforest]
holdout:
  start: "2025-05-01"
  end: "2025-10-30"
mae_limit_report: 56.0
db_proxy_factor: 0.985
min_train_rows: 50
tuning:
  enabled: true
  cv_folds: 5
  elo3_families:
    - elasticnet
    - ridge
    - lasso
    - randomforest
    - extratrees
    - histgradientboosting
    - xgboost
    - lightgbm
    - catboost
  grid_search_pool: train
  training_pool: train
  train_fraction: 0.8
  elo3_oof_stack: false
  elo3_cascade_fill: false
  select_by_cascade: false
  n_jobs: -1
  fast: false
io:
  read_timeout_s: 120
  lock_timeout_s: 30
  max_retries: 3
elo_specs:
  elo1:
    target: Extrativo_AT
    features:
      - pct_A
      - pct_B
      - pct_C
      - pct_D
      - pct_MG
      - pct_ABC
      - pct_CDMG
      - mix_entropy
      - mix_hhi
      - dom_A
      - dom_B
      - dom_C
      - dom_D
      - dom_MG
      - Idade
  elo2:
    target: Carga_Alcalina
    features:
      - Extrativo_AT
      - TPC
      - DB_SGF
  elo3:
    target: TSA_dia
    features:
      - Carga_Alcalina
      - Kappa
      - Prod_alcali_class
      - DB_SGF
      - Idade
      - TPC
      - pct_AB
      - pct_DMG
      - vmi_le_021
      - vmi_021_025
      - vmi_gt_025
      - Extrativo_AT
      - Casca_pct
    column_aliases:
      Prod_alcali_class: "Prod alcali_class"
    categorical_features:
      - Prod_alcali_class
    optional_features:
      - Extrativo_AT
      - Casca_pct
